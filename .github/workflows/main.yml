name: CI
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  detectonly:
    name: Detect use of .only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect use of .only
        run: |
          grep -rq --include '*.spec.js' \.only\( . && echo 'You have .only() in your tests!' && exit 1
          exit 0
  web-test-runner:
    name: Web Test Runner
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Web Test Runner
        run: |
          sudo apt update
          sudo apt-get install -y pulseaudio
          pulseaudio -D --exit-idle-time=-1
          cd wasmaudioworklet
          yarn install
          yarn playwright install
          yarn playwright install-deps
          yarn createbrowsersourcebundle
          xvfb-run yarn wtr
  assemblyscriptsynth:
    name: AssemblyScript synth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Assemblyscript synth
        run: |
          cd wasmaudioworklet
          yarn install
          yarn test-asc-synth:ci
  bundle-pianorolldemo:
    name: Bundle pianorolldemo
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v4
        - name: Use Node.js 20.x
          uses: actions/setup-node@v3
          with:
            node-version: '20'
        - name: Bundle pianorolldemo
          run: |
            cd wasmaudioworklet
            yarn install
            yarn bundle-pianorolldemo
  bundle-songcompiler:
    name: Bundle songcompiler
    runs-on: ubuntu-latest
    steps:
        - uses: actions/checkout@v4
        - name: Use Node.js 20.x
          uses: actions/setup-node@v3
          with:
            node-version: '20'
        - name: Bundle songcompiler
          run: |
            cd wasmaudioworklet
            yarn install
            yarn bundle-songcompiler
  playwright-e2e:
    name: Playwright E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: '20'
      - name: Install dependencies and Playwright
        run: |
          cd wasmaudioworklet
          yarn install
          yarn playwright install --with-deps chromium
      - name: Start NEAR sandbox
        run: |
          docker run --rm -d -p 3030:8080 --name near-git-sandbox ghcr.io/petersalomonsen/near-git-storage/sandbox:main
          for i in $(seq 1 60); do
            curl -s http://localhost:3030/near-info | grep -q contractId && echo "Sandbox ready" && break
            sleep 2
          done
      - name: Run Playwright tests
        run: |
          cd wasmaudioworklet
          npx playwright test ./e2e/near-git.spec.js
      - name: Stop sandbox
        if: always()
        run: docker rm -f near-git-sandbox || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-test-results
          path: wasmaudioworklet/test-results/
